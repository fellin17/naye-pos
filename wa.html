<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp — POS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0fdf4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
    color: #15803d;
  }
  .icon { font-size: 52px; }
  h2 { font-size: 18px; font-weight: 800; }
  p { font-size: 13px; color: #6b7280; text-align: center; max-width: 280px; line-height: 1.6; }
  .dot { display: inline-block; width: 10px; height: 10px; background: #16a34a; border-radius: 50%; animation: pulse 1.5s infinite; margin-right: 6px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>
  <div class="icon">📲</div>
  <h2>Mensajería WhatsApp</h2>
  <p><span class="dot"></span>Activo — no cierres esta pestaña.<br>Cada nota se enviará automáticamente.</p>

<script>
  function irAWhatsApp(url) {
    // Nombre fijo 'wa_actual' — Chrome reutiliza esa ventana siempre
    const win = window.open(url, 'wa_actual');
    if (win) win.focus();
  }

  // Escuchar nuevas URLs desde index.html via BroadcastChannel
  const ch = new BroadcastChannel('naye_wa_ch');
  ch.onmessage = (e) => {
    if (e.data && e.data.url) irAWhatsApp(e.data.url);
  };

  // Primera URL (viene en el query param ?u=)
  const u = new URLSearchParams(location.search).get('u');
  if (u) irAWhatsApp(u);
</script>
</body>
</html>
